<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YIRUI SU</title>
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const forceDesktop = params.get('desktop') === '1';
  const hasProjectDeepLink = !!params.get('project');
  if (forceDesktop || hasProjectDeepLink) return;

  const isNarrowScreen = window.matchMedia('(max-width: 900px)').matches;
  const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  if (isNarrowScreen || isTouchDevice) {
    window.location.replace('./mobile.html');
  }
})();
</script>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  cursor: crosshair;
  background: #fff;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(to right, rgba(20,18,14,0.3) 1pt, transparent 1pt),
    linear-gradient(to right, rgba(20,18,14,0.3), rgba(20,18,14,0.3)),
    linear-gradient(to right, rgba(20,18,14,0.3), rgba(20,18,14,0.3));
  background-size:
    var(--grid-cell-w, 120px) 100%,
    100% 1pt,
    100% 1pt;
  background-position:
    var(--grid-offset-x, 0px) 0,
    0 var(--grid-line-y1, 0px),
    0 var(--grid-line-y2, 0px);
  background-repeat:
    repeat,
    no-repeat,
    no-repeat;
}

/* 隐藏页面最右侧外边缘描边 */
body::after {
  content: '';
  position: fixed;
  top: 0;
  right: 0;
  width: 4px;
  height: 100%;
  background: #fff;
  pointer-events: none;
  z-index: 2;
}

/* 使用独立安全区容器承载外延网格 */
body::before,
body::after {
  display: none;
}

.outer-grid-zone {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(to right, rgba(20,18,14,0.3) 1pt, transparent 1pt),
    linear-gradient(to right, rgba(20,18,14,0.3), rgba(20,18,14,0.3)),
    linear-gradient(to right, rgba(20,18,14,0.3), rgba(20,18,14,0.3));
  background-size:
    var(--grid-cell-w, 120px) 100%,
    100% 1pt,
    100% 1pt;
  background-position:
    var(--grid-local-x, 0px) 0,
    0 var(--grid-local-y1, 0px),
    0 var(--grid-local-y2, 0px);
  background-repeat:
    repeat,
    no-repeat,
    no-repeat;
}

/* 去掉与主体衔接处的叠线（避免某一根竖线变粗） */
#outerGridLeft::after,
#outerGridRight::before {
  content: '';
  position: absolute;
  top: 0;
  width: 1pt;
  height: 100%;
  background: #fff;
}
#outerGridLeft::after { right: 0; }
#outerGridRight::before { left: 0; }

#portfolioRoot {
  position: fixed;
  left: 50%;
  top: 0;
  transform: translateX(-50%);
  width: calc(100vh * 1552 / 880);
  height: 100vh;
  overflow: hidden;
  background: #fff;
  box-sizing: border-box;
  padding-right: 0;
  z-index: 1;
}

.grid, .grid *, .corner-contact, .corner-contact * {
  font-family: 'Microsoft YaHei', '微软雅黑', 'Helvetica Neue', Arial, sans-serif !important;
}

.corner-contact {
  position: absolute;
  left: calc(12px + 10pt);
  bottom: calc(10px + 25pt);
  z-index: 60;
  color: rgba(0,0,0,0.8);
  pointer-events: auto;
  user-select: text;
}
.corner-contact .cn-name {
  font-family:'Songti SC','SimSun',serif;
  font-size: 16pt;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4pt;
}
.corner-contact .en-name {
  font-size: 16pt;
  font-weight: 700;
  line-height: 1;
  letter-spacing: .01em;
  margin-bottom: 18px;
}
.corner-contact .contact-line {
  font-size: 13px;
  line-height: 1.4;
}

/* ══════════════════════════════
   GRID
══════════════════════════════ */
.grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(3, 1fr);
  width: 100%;
  height: 100%;
  gap: 1pt;
  background: rgba(20,18,14,0.3);
}

.cell {
  position: relative;
  overflow: hidden;
  border: none;
  background-image: url('./images/cover.jpg') !important;
  background-size: calc(600% + 0.8px) calc(300% + 0.8px) !important;
  background-repeat: no-repeat !important;
  background-position: var(--cell-x, 0%) var(--cell-y, 0%) !important;
  transform: translateZ(0);
}

.cell-project {
  cursor: pointer;
  border: none;
  margin: -1pt;          /* 覆盖掉该处底层网格线 */
  z-index: 2;
}

/* 右边缘项目避免被负 margin 推出画布后裁切 */
.cell-project.p5 {
  margin-right: 0;
  margin-left: 0;
}
.cell-project::before {
  content: '';
  position: absolute;
  inset: 0;
  border: 1pt solid #0000ff;
  z-index: 5;
  pointer-events: none;
}

/* 05 右侧蓝线防裁切 */
.cell-project.p5::before {
  right: -1px;
}

/* 05 右侧蓝线兜底（单独补一根） */
.cell-project.p5::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  right: 0;
  width: 1pt;
  background: #0000ff;
  z-index: 6;
  pointer-events: none;
}


.p1, .p2, .p3, .p4, .p5 { --color: #0000ff; }

/* project image */
.cell-img {
  position: absolute;
  inset: 0;
  z-index: 1;
  background-color: #fff;
}
.cell-img::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.2); /* 等效 reveal 图透明度约 80%（白底） */
  pointer-events: none;
  z-index: 2;
}
.cell-img > * { position: relative; z-index: 1; }
.cell-img img { width:100%; height:100%; object-fit:cover; }
.img-placeholder { width:100%; height:100%; }

/* label — under cover */
.cell-label {
  position: absolute;
  z-index: 4;
  top: 0;
  left: 0;
  right: 0;
  bottom: auto;
  padding: 10px 10px 0;
  background: transparent;
  color: #0000ff;
  pointer-events: none;
  transition: transform 0.55s cubic-bezier(0.77,0,0.18,1);
  will-change: transform;
}
.label-num  { font-size:clamp(13px,1.3vw,17px); letter-spacing:0; font-weight:400; line-height:1.15; opacity:1; margin-bottom:0; }
.label-name { font-size:clamp(13px,1.3vw,17px); font-weight:400; letter-spacing:0; line-height:1.15; opacity:1; margin-top:2px; }
.label-name-cn { font-size:clamp(13px,1.3vw,17px); font-weight:400; letter-spacing:0; line-height:1.15; opacity:1; margin-top:2px; }
.label-type { font-size:9px; letter-spacing:.16em; text-transform:uppercase; opacity:1; margin-top:3px; }
.label-name-cn:empty,
.label-type:empty { display: none; }

.cell-project:hover .cell-label,
.cell-project:hover .cell-label * {
  color: #0000ff;
}

/* cover — fabric tile, slides up */
.cell-cover {
  position: absolute;
  inset: 0;
  z-index: 3;
  background-image: url('./images/cover.jpg');
  background-size: calc(600% + 0.8px) calc(300% + 0.8px);
  background-repeat: no-repeat;
  background-position: var(--cover-x, 0%) var(--cover-y, 0%);
  transition: transform 0.55s cubic-bezier(0.77,0,0.18,1);
  will-change: transform;
}
.cell-cover img { display: none !important; }
.cell-cover::after { display: none; }
.cell-project:hover .cell-cover {
  transform: translateY(-100%);
}
.cell-project:hover .cell-label {
  transform: translateY(-100%);
}

/* 微调：仅 01 hover 向右 1px */
.cell-project.p1:hover .cell-cover {
  transform: translate(1px, -100%);
}

/* 微调：仅 01 左侧不动，向右额外拉伸 1px */
.cell-project.p1 .cell-cover {
  right: -1px;
}

/* ══════════════════════════════
   DETAIL PANEL
══════════════════════════════ */
.detail-panel {
  position: absolute;
  inset: 0;
  z-index: 200;
  background: #ffffff;

  /* slide in from right */
  transform: translateX(100%);
  transition: transform 0.6s cubic-bezier(0.77,0,0.18,1);
  overflow-y: auto;
  cursor: default;
}
.detail-panel.open {
  transform: translateX(0);
}

/* thin colored top bar matching project color */
.detail-panel::before {
  content: '';
  display: block;
  height: 2px;
  background: var(--panel-color, #999);
}

/* back button */
.back-btn {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 40px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(20,18,14,0.12);
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(20,18,14,0.6);
  transition: color 0.2s;
  border: none;
  width: 100%;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}
.back-btn:hover { color: rgba(20,18,14,1); }
.back-arrow {
  font-size: 16px;
  line-height: 1;
  transition: transform 0.2s;
}
.back-btn:hover .back-arrow { transform: translateX(-4px); }

/* detail content area */
.detail-content {
  padding: 60px 80px 100px;
  max-width: 1100px;
}

.detail-header {
  margin-bottom: 60px;
  border-bottom: 1px solid rgba(20,18,14,0.15);
  padding-bottom: 40px;
}
.detail-num {
  font-size: 10px;
  letter-spacing: 0.25em;
  opacity: 0.4;
  margin-bottom: 12px;
}
.detail-title {
  font-size: clamp(40px, 6vw, 80px);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1;
  color: #1a1814;
  margin-bottom: 8px;
}
.detail-title-cn {
  font-family: 'Songti SC','SimSun',serif;
  font-size: clamp(20px, 2.5vw, 36px);
  font-weight: 400;
  color: rgba(20,18,14,0.5);
  margin-bottom: 20px;
}
.detail-type {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  border: 1px solid var(--panel-color, #999);
  color: var(--panel-color, #999);
  padding: 5px 12px;
  border-radius: 2px;
}

/* image area placeholder */
.detail-img-area {
  width: 100%;
  aspect-ratio: 16/9;
  background: rgba(20,18,14,0.06);
  border: 1px solid rgba(20,18,14,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 48px;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: rgba(20,18,14,0.3);
  text-transform: uppercase;
}

/* detail link — prominent CTA button */
.detail-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-decoration: none;
  color: #fff;
  background: #1a1814;
  padding: 12px 24px;
  border: 2px solid #1a1814;
  transition: background 0.2s, color 0.2s;
}
.detail-link:hover {
  background: transparent;
  color: #1a1814;
}

/* stat blocks */
.three-col {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.stat-block {
  border-top: 2px solid rgba(20,18,14,0.12);
  padding-top: 12px;
}
.stat-num {
  font-size: clamp(24px, 3vw, 36px);
  font-weight: 700;
  color: #1a1814;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 6px;
}
.stat-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  color: rgba(20,18,14,0.4);
}

/* timeline */
.timeline-list {
  margin-top: 20px;
  border-left: 2px solid rgba(20,18,14,0.1);
  padding-left: 20px;
}
.timeline-item {
  display: flex;
  gap: 20px;
  align-items: baseline;
  padding: 10px 0;
  border-bottom: 1px solid rgba(20,18,14,0.06);
  font-size: 13px;
}
.tl-day {
  min-width: 70px;
  font-weight: 700;
  color: rgba(20,18,14,0.4);
  font-size: 11px;
  letter-spacing: 0.05em;
}
.tl-desc { color: rgba(20,18,14,0.7); }

/* meta row */
.detail-meta-row {
  margin-top: 16px;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: rgba(20,18,14,0.4);
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.detail-meta-row .dot { opacity: 0.3; }

/* ritual table */
.ritual-table {
  margin-top: 28px;
  border-top: 1px solid rgba(20,18,14,0.1);
  width: 100%;
  max-width: 520px;
}
.ritual-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(20,18,14,0.08);
  font-size: 13px;
  color: rgba(20,18,14,0.7);
}
.ritual-row.header-row {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(20,18,14,0.35);
  padding-bottom: 8px;
}

/* quote block */
.quote-block {
  border-left: 3px solid #ccc;
  padding: 20px 24px;
  background: rgba(20,18,14,0.03);
  margin: 8px 0;
}
.quote-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(20,18,14,0.4);
  margin-bottom: 14px;
}
.quote-text {
  font-size: 15px;
  line-height: 1.75;
  color: rgba(20,18,14,0.75);
  margin-bottom: 12px;
  max-width: 640px;
}
.quote-text-cn {
  font-family: 'Songti SC','SimSun',serif;
  font-size: 13px;
  line-height: 1.8;
  color: rgba(20,18,14,0.45);
  max-width: 640px;
}

/* section heading */
.section-heading {
  font-size: clamp(18px, 2vw, 24px);
  font-weight: 700;
  color: #1a1814;
  margin-bottom: 16px;
  letter-spacing: -0.01em;
}

/* phase list */
.phase-list {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-top: 16px;
}
@media (max-width: 900px) {
  .phase-list { grid-template-columns: repeat(2, 1fr); }
}
.phase-item {}
.phase-num {
  font-size: 8px;
  letter-spacing: 0.2em;
  color: rgba(20,18,14,0.35);
  margin-bottom: 4px;
}
.phase-title {
  font-size: 11px;
  font-weight: 600;
  color: rgba(20,18,14,0.7);
  margin-bottom: 8px;
}

/* image placeholders */
.img-placeholder-block {
  width: 100%;
  background: rgba(20,18,14,0.05);
  border: 1px dashed rgba(20,18,14,0.15);
  min-height: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: rgba(20,18,14,0.25);
  text-align: center;
  padding: 12px;
  box-sizing: border-box;
}
.img-placeholder-block.tall { min-height: 320px; }
.img-caption {
  display: block;
  margin-top: 6px;
  font-style: italic;
  opacity: 0.7;
}

/* image grids */
.img-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 20px;
}
.img-grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 20px;
}
@media (max-width: 700px) {
  .img-grid-2, .img-grid-3 { grid-template-columns: 1fr; }
}

/* act blocks */
.act-block {
  border-left: 2px solid rgba(20,18,14,0.1);
  padding-left: 24px;
  margin-bottom: 40px;
}
.act-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(20,18,14,0.35);
  margin-bottom: 8px;
}
.act-title {
  font-size: clamp(15px, 1.6vw, 19px);
  font-weight: 700;
  color: #1a1814;
  margin-bottom: 14px;
  line-height: 1.3;
}
.act-title .cn {
  font-family: 'Songti SC','SimSun',serif;
  font-weight: 400;
  font-size: 0.85em;
  color: rgba(20,18,14,0.45);
}
.cn-sub {
  font-family: 'Songti SC','SimSun',serif;
  font-size: 13px !important;
  color: rgba(20,18,14,0.45) !important;
  margin-top: 8px !important;
  line-height: 1.8 !important;
}

/* criteria list */
.criteria-list {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 20px;
}
@media (max-width: 800px) {
  .criteria-list { grid-template-columns: 1fr; }
}
.criteria-item {
  padding: 16px;
  background: rgba(20,18,14,0.03);
  border: 1px solid rgba(20,18,14,0.08);
}
.criteria-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: rgba(20,18,14,0.8);
  margin-bottom: 8px;
}
.criteria-desc {
  font-size: 12px;
  line-height: 1.6;
  color: rgba(20,18,14,0.55);
}

/* reflection grid */
.reflection-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-top: 16px;
}
@media (max-width: 800px) {
  .reflection-grid { grid-template-columns: 1fr; }
}
.reflection-item {
  border-top: 2px solid rgba(20,18,14,0.12);
  padding-top: 16px;
}
.reflection-num {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(20,18,14,0.3);
  margin-bottom: 8px;
}
.reflection-title {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.4;
  color: #1a1814;
  margin-bottom: 12px;
}
.reflection-title .cn {
  font-family: 'Songti SC','SimSun',serif;
  font-weight: 400;
  font-size: 0.9em;
  color: rgba(20,18,14,0.45);
  display: block;
  margin-top: 2px;
}

/* text blocks */
.detail-section {
  margin-bottom: 40px;
}
.detail-section-label {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(20,18,14,0.4);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.detail-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(20,18,14,0.12);
}
.detail-body {
  font-size: 15px;
  line-height: 1.75;
  color: rgba(20,18,14,0.7);
  max-width: 640px;
}

/* ── Mobile-only layout (desktop unchanged) ───────────────────────────── */
@media (max-width: 768px) {
  html, body {
    overflow: hidden;
    background: #000;
  }

  #outerGridLeft,
  #outerGridRight {
    display: none !important;
  }

  #portfolioRoot {
    left: 0 !important;
    top: 0 !important;
    transform: none !important;
    width: 100vw !important;
    height: 100dvh !important;
    padding: 0 !important;
    background-image: url('./images/mobile-cover-v2.jpg') !important;
    background-size: cover !important;
    background-position: center bottom !important;
    background-repeat: no-repeat !important;
  }

  .grid {
    position: relative;
    grid-template-columns: repeat(3, 1fr) !important;
    grid-template-rows: repeat(4, 1fr) !important;
    grid-auto-rows: calc(100% / 4) !important;
    overflow: hidden !important;
    gap: 1px !important;
    background: transparent !important;
  }

  .grid::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(to right, transparent 33.333%, #0000ff 33.333%, #0000ff calc(33.333% + 1px), transparent calc(33.333% + 1px), transparent 66.666%, #0000ff 66.666%, #0000ff calc(66.666% + 1px), transparent calc(66.666% + 1px)),
      linear-gradient(to bottom, transparent 25%, #0000ff 25%, #0000ff calc(25% + 1px), transparent calc(25% + 1px), transparent 50%, #0000ff 50%, #0000ff calc(50% + 1px), transparent calc(50% + 1px), transparent 75%, #0000ff 75%, #0000ff calc(75% + 1px), transparent calc(75% + 1px));
  }

  .grid > .cell {
    display: block !important;
    background-image: url('./images/mobile-cover-v2.jpg') !important;
    background-size: calc(300% + 0.8px) calc(400% + 0.8px) !important;
    background-repeat: no-repeat !important;
    background-position: var(--cell-x, 0%) var(--cell-y, 0%) !important;
  }

  .grid > .cell:nth-child(1)  { --cell-x: 0%;   --cell-y: 0%; }
  .grid > .cell:nth-child(2)  { --cell-x: 50%;  --cell-y: 0%; }
  .grid > .cell:nth-child(3)  { --cell-x: 100%; --cell-y: 0%; }
  .grid > .cell:nth-child(4)  { --cell-x: 0%;   --cell-y: 33.333%; }
  .grid > .cell:nth-child(5)  { --cell-x: 50%;  --cell-y: 33.333%; }
  .grid > .cell:nth-child(6)  { --cell-x: 100%; --cell-y: 33.333%; }
  .grid > .cell:nth-child(7)  { --cell-x: 0%;   --cell-y: 66.667%; }
  .grid > .cell:nth-child(8)  { --cell-x: 50%;  --cell-y: 66.667%; }
  .grid > .cell:nth-child(9)  { --cell-x: 100%; --cell-y: 66.667%; }
  .grid > .cell:nth-child(10) { --cell-x: 0%;   --cell-y: 100%; }
  .grid > .cell:nth-child(11) { --cell-x: 50%;  --cell-y: 100%; }
  .grid > .cell:nth-child(12) { --cell-x: 100%; --cell-y: 100%; }

  .cell-project {
    margin: 0 !important;
    min-height: 0;
    z-index: 6 !important;
  }

  .cell-project::before {
    display: block !important;
    border: 1px solid #0000ff !important;
  }

  .cell-project.p5::after {
    display: block !important;
    background: #0000ff !important;
  }

  .cell-project.p1 { grid-column: 1; grid-row: 2; --cell-x: 0%; --cell-y: 33.333%; --cover-x: 0%; --cover-y: 33.333%; }
  .cell-project.p2 { grid-column: 3; grid-row: 2; --cell-x: 100%; --cell-y: 33.333%; --cover-x: 100%; --cover-y: 33.333%; }
  .cell-project.p3 { grid-column: 2; grid-row: 3; --cell-x: 50%; --cell-y: 66.667%; --cover-x: 50%; --cover-y: 66.667%; }
  .cell-project.p4 { grid-column: 1; grid-row: 4; --cell-x: 0%; --cell-y: 100%; --cover-x: 0%; --cover-y: 100%; }
  .cell-project.p5 { grid-column: 3; grid-row: 4; --cell-x: 100%; --cell-y: 100%; --cover-x: 100%; --cover-y: 100%; }

  .cell-cover,
  .cell-cover img,
  .cell-img {
    display: none !important;
  }

  .cell-label {
    padding: 10px 8px 0 !important;
  }

  .label-num,
  .label-name,
  .label-name-cn {
    font-size: 12px !important;
    line-height: 1.15 !important;
  }

  .label-type { display: none !important; }

  .corner-contact {
    left: 0 !important;
    top: 0 !important;
    bottom: auto !important;
    width: 100% !important;
    height: calc(100% / 4) !important;
    padding: 8px;
    z-index: 80;
    color: rgba(0, 0, 0, 0.82);
  }

  .corner-contact .cn-name,
  .corner-contact .en-name {
    font-size: 14px !important;
    line-height: 1.1 !important;
    margin: 0 !important;
  }

  .corner-contact .cn-name,
  .corner-contact .en-name {
    position: absolute;
    left: calc(100% / 12);
    top: 8px;
  }

  .corner-contact .en-name {
    top: 28px;
  }

  .corner-contact .contact-line {
    position: absolute;
    font-size: 11px !important;
    line-height: 1.25 !important;
    white-space: nowrap;
  }

  .corner-contact .contact-line:nth-of-type(1) {
    left: calc(100% / 3 + 8px);
    top: 10px;
    display: block !important;
  }

  .corner-contact .contact-line:nth-of-type(2),
  .corner-contact .contact-line:nth-of-type(4) {
    display: none !important;
  }

  .corner-contact .contact-line:nth-of-type(3) {
    left: calc(100% * 2 / 3 + 8px);
    top: 10px;
    display: block !important;
  }
}

</style>

<div class="detail-section">
  <div class="quote-block" style="border-left-color:#e05a3a;">
    <div class="quote-label">On AI's role in design · AI在设计中的角色</div>
    <p class="quote-text">
      AI is not a replacement for design thinking — it is an accelerator for visual imagination. It compresses the divergent phase of the design process, letting you see more possibilities faster. But convergence — the act of choosing, judging, and committing — remains entirely human. In this project, AI was my creative sparring partner. It didn't design the tiger. It showed me forms I could never have drawn, and I decided which one was the tiger.
    </p>
    <p class="quote-text-cn">
      AI不是设计思维的替代品——它是视觉想象力的加速器。它压缩了设计过程的发散阶段，让你更快地看到更多可能性。但收敛——选择、判断和承诺的行为——完全是人类的。在这个项目中，AI是我的创意对练搭档。它没有设计那只老虎。它向我展示了我永远无法画出的形态，而我决定了哪一个是那只老虎。

    <h4 class="act-title">From "Tiger Climbing a Mountain" to Five Wearable Blocks<br><span class="cn">从"老虎上山"到五个可穿戴体块</span></h4>
    <p class="detail-body">
      AI contributed ~80% of the final sculptural form through a multi-round co-creation process between hand sketching, AI generation, and physical paper model verification. I tested three keyword groups. The second group — mystery, ritual, primal force, shamanism — produced the resonant image: dark backgrounds, organic forms growing forward with a sense of life force. This locked the material decision: walnut for primal weight, silver for ritual accent.
    </p>
    <p class="detail-body cn-sub">我测试了三组关键词。第二组——神秘、仪式感、原始力量、巫术——产出了最打动我的图像。从中我提取了设计语言：体块感、动态、结构、纹理。这也锁定了材料：胡桃木代表原始的重量感，银代表仪式的点缀。</p>

    <h4 class="act-title">Extracting the Tiger's Gesture<br><span class="cn">提取老虎的姿态</span></h4>
    <p class="detail-body">
      I analyzed a white tiger photograph by hand, progressively extracting the climbing gesture: first the dynamic curve, then geometric blocks, then curved surfaces, then the final silhouette. This human analysis preceded any AI generation — I needed to understand the movement before asking AI to interpret it.
    </p>
    <p class="detail-body cn-sub">我手动分析了一张白虎照片，渐进式提取攀升姿态：先是动态曲线，再是几何体块，然后是曲面，最后是最终轮廓。这个人工分析先于任何AI生成——我需要先理解这个运动，才能让AI去诠释它。</p>

// ── open / close ──────────────────────────────────────────────────────────
const panel = document.getElementById('detailPanel');
const content = document.getElementById('detailContent');

function openDetail(key) {
  const m = projectMeta[key];
  panel.style.setProperty('--panel-color', m.color);
  content.innerHTML = detailHTML[key];
  panel.classList.add('open');
  panel.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  panel.classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

// ── Grid remap + Scheme A cover positioning (6×3) ───────────────────────
(function applyGridRemapAndCover() {
  const grid = document.getElementById('grid');
  if (!grid) return;

  const target = {
    nuo:    { row: 1, col: 2 },
    vintage:{ row: 2, col: 3 },
    wechat: { row: 3, col: 4 },
    photo:  { row: 2, col: 5 },
    m8:     { row: 1, col: 6 },
  };

  const cells = Array.from(grid.children);
  const projectCells = new Map();

  const ensureVideoPlayback = (video) => {
    if (!video) return;
    video.setAttribute('muted', '');
    video.setAttribute('playsinline', '');
    video.setAttribute('webkit-playsinline', 'true');
    video.setAttribute('x5-playsinline', 'true');
    video.preload = 'auto';
    video.load();
    const p = video.play();
    if (p && typeof p.catch === 'function') p.catch(() => {});
  };

  const resumeAllRevealVideos = () => {
    document.querySelectorAll('video.reveal-video').forEach(v => ensureVideoPlayback(v));
  };

  for (const cell of cells) {
    const onclick = cell.getAttribute('onclick') || '';
    const m = onclick.match(/openDetail\('([^']+)'\)/);
    if (!m) continue;
    const key = m[1];
    if (!target[key]) continue;
    projectCells.set(key, cell);

    // Reveal 测试视频：03（wechat）
    if (key === 'wechat') {
      const testRevealVideo = "./images/reveal-03.mp4";
      const imgLayer = cell.querySelector('.cell-img');
      const placeholder = cell.querySelector('.img-placeholder');
      if (imgLayer) {
        imgLayer.style.backgroundImage = 'none';
        let video = imgLayer.querySelector('video.reveal-video');
        if (!video) {
          video = document.createElement('video');
          video.className = 'reveal-video';
          video.autoplay = true;
          video.loop = true;
          video.muted = true;
          video.playsInline = true;
          video.preload = 'metadata';
          video.style.width = '100%';
          video.style.height = '100%';
          video.style.objectFit = 'cover';
          video.style.display = 'block';
          video.style.pointerEvents = 'none'; // 不允许编辑/交互
          imgLayer.appendChild(video);
        }
        video.src = testRevealVideo;
        ensureVideoPlayback(video);
      }
      if (placeholder) placeholder.style.display = 'none';
    }

    // Reveal 测试视频：02（vintage）
    if (key === 'vintage') {
      const testRevealVideo = "./images/reveal-02.mp4";
      const imgLayer = cell.querySelector('.cell-img');
      const placeholder = cell.querySelector('.img-placeholder');
      if (imgLayer) {
        imgLayer.style.backgroundImage = 'none';
        let video = imgLayer.querySelector('video.reveal-video');
        if (!video) {
          video = document.createElement('video');
          video.className = 'reveal-video';
          video.autoplay = true;
          video.loop = true;
          video.muted = true;
          video.playsInline = true;
          video.preload = 'metadata';
          video.style.width = '100%';
          video.style.height = '100%';
          video.style.objectFit = 'cover';
          video.style.display = 'block';
          video.style.pointerEvents = 'none';
          imgLayer.appendChild(video);
        }
        video.src = testRevealVideo;
        ensureVideoPlayback(video);
      }
      if (placeholder) placeholder.style.display = 'none';
    }

    // Reveal 测试视频：01（nuo）
    if (key === 'nuo') {
      const testRevealVideo = "./images/reveal-01.mp4";
      const imgLayer = cell.querySelector('.cell-img');
      const placeholder = cell.querySelector('.img-placeholder');
      if (imgLayer) {
        imgLayer.style.backgroundImage = 'none';
        let video = imgLayer.querySelector('video.reveal-video');
        if (!video) {
          video = document.createElement('video');
          video.className = 'reveal-video';
          video.autoplay = true;
          video.loop = true;
          video.muted = true;
          video.playsInline = true;
          video.preload = 'metadata';
          video.style.width = '100%';
          video.style.height = '100%';
          video.style.objectFit = 'cover';
          video.style.display = 'block';
          video.style.pointerEvents = 'none';
          imgLayer.appendChild(video);
        }
        video.src = testRevealVideo;
        ensureVideoPlayback(video);
      }
      if (placeholder) placeholder.style.display = 'none';
    }

    // Reveal 测试视频：05（m8 / other works）
    if (key === 'm8') {
      const testRevealVideo = "./images/reveal-05.mp4";
      const imgLayer = cell.querySelector('.cell-img');
      const placeholder = cell.querySelector('.img-placeholder');
      if (imgLayer) {
        imgLayer.style.backgroundImage = 'none';
        let video = imgLayer.querySelector('video.reveal-video');
        if (!video) {
          video = document.createElement('video');
          video.className = 'reveal-video';
          video.autoplay = true;
          video.loop = true;
          video.muted = true;
          video.playsInline = true;
          video.preload = 'metadata';
          video.style.width = '100%';
          video.style.height = '100%';
          video.style.objectFit = 'cover';
          video.style.display = 'block';
          video.style.pointerEvents = 'none';
          imgLayer.appendChild(video);
        }
        video.src = testRevealVideo;
        ensureVideoPlayback(video);
      }
      if (placeholder) placeholder.style.display = 'none';
    }

    // cover 位置会在重排后统一按最终格子计算
  }


  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) resumeAllRevealVideos();
  });

  const kickstartOnGesture = () => {
    resumeAllRevealVideos();
    document.removeEventListener('touchstart', kickstartOnGesture);
    document.removeEventListener('click', kickstartOnGesture);
  };
  document.addEventListener('touchstart', kickstartOnGesture, { passive: true });
  document.addEventListener('click', kickstartOnGesture);


  if (projectCells.size === 0) return;

  const isProjectCell = c => {
    const onclick = c.getAttribute('onclick') || '';
    return /openDetail\('(nuo|wechat|vintage|photo|m8)'\)/.test(onclick);
  };

  const nonProjects = cells.filter(c => !isProjectCell(c));
  const total = cells.length;
  const rebuilt = new Array(total).fill(null);

  for (const [key, pos] of Object.entries(target)) {
    const cell = projectCells.get(key);
    if (!cell) continue;
    const idx = (pos.row - 1) * 6 + (pos.col - 1);
    if (idx >= 0 && idx < total) rebuilt[idx] = cell;
  }

  let np = 0;
  for (let i = 0; i < total; i++) {
    if (!rebuilt[i]) rebuilt[i] = nonProjects[np++];
  }

  grid.replaceChildren(...rebuilt.filter(Boolean));

  // 让初始状态就是“一整张图被 6×3 网格切开”
  const finalCells = Array.from(grid.children);
  finalCells.forEach((cell, i) => {
    const row = Math.floor(i / 6) + 1;
    const col = (i % 6) + 1;
    const x = ((col - 1) / 5) * 100;
    const y = ((row - 1) / 2) * 100;

    // 所有格子的底图切片
    cell.style.setProperty('--cell-x', `${x}%`);
    cell.style.setProperty('--cell-y', `${y}%`);

    // 项目格子的 cover 切片（用于 hover 上掀）
    const onclick = cell.getAttribute('onclick') || '';
    if (/openDetail\('(nuo|wechat|vintage|photo|m8)'\)/.test(onclick)) {
      cell.style.setProperty('--cover-x', `${x}%`);
      cell.style.setProperty('--cover-y', `${y}%`);
    }
  });
})();

// ── 外围留白区网格延伸同步 ─────────────────────────────────────────────
(function syncOuterGrid() {
  const root = document.getElementById('portfolioRoot');
  if (!root) return;

  const apply = () => {
    const grid = document.getElementById('grid');
    if (!grid || grid.children.length < 7) return;

    const c1 = grid.children[0].getBoundingClientRect();
    const c2 = grid.children[1].getBoundingClientRect();
    const c7 = grid.children[6].getBoundingClientRect();
    const c13 = grid.children[12].getBoundingClientRect();

    // 垂直线：继续使用真实列步进
    const stepX = c2.left - c1.left;
    const lineX = (c1.right + c2.left) / 2;

    // 水平线：两条分隔线单独控制，便于独立微调
    const lineY1 = (c1.bottom + c7.top) / 2 - 1; // 两条横线一起上移 1pt
    const lineY2 = (c7.bottom + c13.top) / 2;     // 原来 +1，再整体 -1 后回到中心

    const leftZone = document.getElementById('outerGridLeft');
    const rightZone = document.getElementById('outerGridRight');
    if (!leftZone || !rightZone) return;

    const rr = root.getBoundingClientRect();
    const zoneTop = rr.top;
    const zoneHeight = rr.height;

    const applyZone = (zone, zoneLeft, zoneWidth) => {
      zone.style.left = `${zoneLeft}px`;
      zone.style.top = `${zoneTop}px`;
      zone.style.width = `${zoneWidth}px`;
      zone.style.height = `${zoneHeight}px`;
      zone.style.setProperty('--grid-cell-w', `${stepX}px`);
      zone.style.setProperty('--grid-local-x', `${lineX - zoneLeft}px`);
      zone.style.setProperty('--grid-local-y1', `${lineY1 - zoneTop}px`);
      zone.style.setProperty('--grid-local-y2', `${lineY2 - zoneTop}px`);
    };

    // 只在主画布左右两侧各 500px 安全区显示外延网格，避免与内部网格叠线
    applyZone(leftZone, rr.left - 500, 500);
    applyZone(rightZone, rr.right, 500);
  };

  apply();
  window.addEventListener('resize', apply);
})();
